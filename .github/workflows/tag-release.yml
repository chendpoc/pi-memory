name: Tag Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.13)"
        required: true
        default: "v0.1.13"
      skip_github_release:
        description: "Skip GitHub Release (enable when the release already exists)"
        type: boolean
        default: true
      publish_npm:
        description: "Publish to npm via OIDC trusted publishing"
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify Node.js version
        run: |
          node -v
          node -e "const major=+process.versions.node.split('.')[0]; if (major < 24) { console.error('Expected Node >=24'); process.exit(1); }"

      - name: Verify tag matches package.json version
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TAG="${TAG#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v${TAG} does not match package.json version ${VERSION}"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BODY=$(awk -v ver="$VERSION" '
            $0 == "## " ver { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release v${VERSION}."
          fi
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.skip_github_release != true
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false

      - name: Publish to npm
        if: github.event_name == 'push' || inputs.publish_npm == true
        run: |
          NPM_VERSION="$(npm -v)"
          echo "npm ${NPM_VERSION}"
          node -e "
            const [a,b,c]=process.argv[1].split('.').map(Number);
            if (a < 11 || (a === 11 && b < 5) || (a === 11 && b === 5 && c < 1)) {
              console.error('npm >= 11.5.1 required for trusted publishing');
              process.exit(1);
            }
          " "$NPM_VERSION"
          npm publish --access public
